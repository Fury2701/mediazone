# /etc/nginx/sites-available/mediazone
# Додай цей файл на control-node (172.201.251.186)
# разом з існуючим конфігом для k8s-lab-app
#
# sudo cp mediazone.conf /etc/nginx/sites-available/mediazone
# sudo ln -s /etc/nginx/sites-available/mediazone /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # Якщо домену нема — слухаємо на окремому порту 8080
    # (порт 80 може бути зайнятий k8s-lab-app)
    server_name _;

    location / {
        proxy_pass         http://10.1.1.4:30081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Якщо хочеш на окремому порту без конфлікту ────────────────────────────────
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass         http://10.1.1.4:30081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

