# ── Image ─────────────────────────────────────────────────────────────────────
# Той самий registry що і k8s-lab-app: ghcr.io/fury2701/
image:
  repository: ghcr.io/fury2701/mediazone
  pullPolicy: Always
  tag: "8e0fd5f"

replicaCount: 2

# ── Service ───────────────────────────────────────────────────────────────────
# NodePort 30081 щоб не конфліктувати з твоїм існуючим 30080 (k8s-lab-app)
service:
  type: NodePort
  port: 8000
  nodePort: 30081

# ── Ingress (Traefik — вбудований в K3S) ─────────────────────────────────────
ingress:
  enabled: true
  className: traefik
  # Traefik routing за Host header
  # Якщо домену нема — залиш порожнім, доступ через nodePort нижче
  host: ""   # Замінити на твій домен коли буде, напр: mzrp.example.com

# ── Secrets (заміни паролі!) ──────────────────────────────────────────────────
env:
  DATABASE_URL: "mysql+pymysql://mzrp:7741667502Rfa-14@mysql.mediazone:3306/mediazone"
  SECRET_KEY: "n7F4xQ9pL2sV8mK3dR6wT1yU5zA0bHcE"

# ── MySQL StatefulSet ─────────────────────────────────────────────────────────
mysql:
  enabled: true
  rootPassword: "7741667502Rfa-14"
  database: mediazone
  user: mzrp
  password: "7741667502Rfa-14"
  storage: 10Gi
  # Використовує local-path provisioner — вбудований в K3S
  storageClass: local-path

# ── Resources (розраховано під твої lab-vm — 2 vCPU / 4GB RAM) ───────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 400m
    memory: 384Mi

# ── HPA ───────────────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: mediazone
